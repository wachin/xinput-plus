<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!--
  xinput-plus application icon
  Concept: mouse pointer cursor with a speed slider beneath it,
  representing per-device pointer speed adjustment.
  Designed for use at 16×16 through 512×512 (scalable).
  License: GPL-3+
  Author: xinput-plus project
-->

<svg
   viewBox="0 0 64 64"
   width="64"
   height="64"
   version="1.1"
   id="svg588"
   sodipodi:docname="xinput-plus.svg"
   inkscape:version="1.2.2 (b0a8486541, 2022-12-01)"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns:xlink="http://www.w3.org/1999/xlink"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <sodipodi:namedview
     id="namedview590"
     pagecolor="#ffffff"
     bordercolor="#000000"
     borderopacity="0.25"
     inkscape:showpageshadow="2"
     inkscape:pageopacity="0.0"
     inkscape:pagecheckerboard="0"
     inkscape:deskcolor="#d1d1d1"
     showgrid="false"
     inkscape:zoom="4.2381734"
     inkscape:cx="56.392219"
     inkscape:cy="25.12875"
     inkscape:window-width="1360"
     inkscape:window-height="726"
     inkscape:window-x="0"
     inkscape:window-y="0"
     inkscape:window-maximized="1"
     inkscape:current-layer="svg588" />
  <defs
     id="defs562">
    <!-- Background circle gradient: deep blue to indigo -->
    <radialGradient
       id="bgGrad"
       cx="26"
       cy="23"
       r="38.999999"
       fx="26"
       fy="23"
       gradientUnits="userSpaceOnUse"
       gradientTransform="matrix(1.067794,0,0,1.067794,-1.9334566,-2.1002989)">
      <stop
         offset="0%"
         stop-color="#3a6fd8"
         id="stop546" />
      <stop
         offset="100%"
         stop-color="#1a2f6e"
         id="stop548" />
    </radialGradient>
    <!-- Cursor body gradient: white to light grey -->
    <linearGradient
       id="cursorGrad"
       x1="26.95296"
       y1="6.7659441"
       x2="41.290771"
       y2="30.662295"
       gradientTransform="scale(0.71977253,1.3893278)"
       gradientUnits="userSpaceOnUse">
      <stop
         offset="0%"
         stop-color="#ffffff"
         id="stop551" />
      <stop
         offset="100%"
         stop-color="#d0d8f0"
         id="stop553" />
    </linearGradient>
    <!-- Speed accent gradient: cyan to bright blue -->
    <linearGradient
       id="accentGrad"
       x1="0%"
       y1="0%"
       x2="100%"
       y2="0%">
      <stop
         offset="0%"
         stop-color="#00d4ff"
         id="stop556" />
      <stop
         offset="100%"
         stop-color="#0090ff"
         id="stop558" />
    </linearGradient>
    <!-- Drop shadow filter for the cursor -->
    <filter
       id="shadow"
       x="-0.037500001"
       y="-0.018746428"
       width="1.0749961"
       height="1.0374958">
      <feDropShadow
         dx="1"
         dy="2"
         stdDeviation="1.5"
         flood-color="#000d2e"
         flood-opacity="0.45" />
    </filter>
    <linearGradient
       id="SVGID_cursorGrad_19"
       gradientUnits="userSpaceOnUse"
       x1="26.95296"
       y1="6.7659441"
       x2="41.290771"
       y2="30.662295"
       gradientTransform="scale(0.71977253,1.3893278)">
      <stop
         offset="0%"
         style="stop-color:rgba(255,255,255,1);"
         id="stop374" />
      <stop
         offset="100%"
         style="stop-color:rgba(208,216,240,1);"
         id="stop376" />
    </linearGradient>
    <linearGradient
       inkscape:collect="always"
       xlink:href="#accentGrad"
       id="linearGradient1320"
       x1="3.7139068"
       y1="134.62912"
       x2="14.484236"
       y2="134.62912"
       gradientTransform="matrix(2.8751232,0,0,0.39656873,-1.9334566,-2.1002989)"
       gradientUnits="userSpaceOnUse" />
    <linearGradient
       inkscape:collect="always"
       xlink:href="#accentGrad"
       id="linearGradient1322"
       x1="16.326839"
       y1="28.96519"
       x2="20.306789"
       y2="28.96519"
       gradientTransform="scale(2.2110832,0.45226701)"
       gradientUnits="userSpaceOnUse" />
    <linearGradient
       inkscape:collect="always"
       xlink:href="#accentGrad"
       id="linearGradient1324"
       x1="16.223964"
       y1="40.923413"
       x2="19.44266"
       y2="40.923413"
       gradientTransform="scale(2.2990682,0.43495883)"
       gradientUnits="userSpaceOnUse" />
    <linearGradient
       inkscape:collect="always"
       xlink:href="#accentGrad"
       id="linearGradient1326"
       x1="16.629656"
       y1="52.767177"
       x2="18.974864"
       y2="52.767177"
       gradientTransform="scale(2.3452079,0.42640143)"
       gradientUnits="userSpaceOnUse" />
    <linearGradient
       inkscape:collect="always"
       xlink:href="#accentGrad"
       id="linearGradient1328"
       x1="39.244838"
       y1="12.050247"
       x2="48.811446"
       y2="12.050247"
       gradientTransform="scale(0.91986621,1.0871146)"
       gradientUnits="userSpaceOnUse" />
  </defs>
  <!-- ── Background circle ── -->
  <circle
     cx="32.23595"
     cy="32.069107"
     r="32.033821"
     fill="url(#bgGrad)"
     id="circle564"
     style="fill:url(#bgGrad);stroke-width:1.06779" />
  <!-- ── Subtle inner ring (depth) ── -->
  <circle
     cx="32.23595"
     cy="32.069107"
     r="30.966026"
     fill="none"
     stroke="#ffffff"
     stroke-width="0.427118"
     opacity="0.15"
     id="circle566" />
  <!-- ══════════════════════════════════════
       CURSOR  (classic arrow pointer)
       Tip at (20, 10); body extends down-right
       ══════════════════════════════════════ -->
  <g
     filter="url(#shadow)"
     id="g570"
     transform="matrix(1.067794,0,0,1.067794,-1.9334566,-2.1002989)">
    <!-- Cursor fill -->
    <path
       d="m 20,10 v 28 l 5.5,-6 5,10 3,-1.5 -5,-10 H 36 Z"
       fill="url(#cursorGrad)"
       stroke="#1a2f6e"
       stroke-width="1.2"
       stroke-linejoin="round"
       stroke-linecap="round"
       id="path568"
       style="fill:url(#cursorGrad)" />
  </g>
  <!-- ══════════════════════════════════════
       SPEED SLIDER  (horizontal track + knob)
       Positioned in the lower portion of the icon
       ══════════════════════════════════════ -->
  <!-- Track background (full width, rounded) -->
  <rect
     x="8.744483"
     y="51.289398"
     width="46.982937"
     height="4.2711759"
     rx="2.1355879"
     ry="2.1355879"
     fill="#0d1f55"
     opacity="0.7"
     id="rect572"
     style="opacity:1;fill:#999999;stroke-width:1.06779" />
  <!-- Active track (left portion — shows current speed ~65%) -->
  <rect
     x="8.744483"
     y="51.289398"
     width="30.966026"
     height="4.2711759"
     rx="2.1355879"
     ry="2.1355879"
     fill="url(#accentGrad)"
     id="rect574"
     style="fill:url(#linearGradient1320);stroke-width:1.06779" />
  <!-- Knob (circle at the active track end) -->
  <circle
     cx="39.71051"
     cy="53.424988"
     r="5.3389697"
     fill="#ffffff"
     stroke="#0090ff"
     stroke-width="1.60169"
     id="circle576" />
  <!-- Knob inner dot (gives it a tactile feel) -->
  <circle
     cx="39.71051"
     cy="53.424988"
     r="1.9220291"
     fill="#0090ff"
     id="circle578"
     style="stroke-width:1.06779" />
  <!-- ══════════════════════════════════════
       SPEED LINES  (motion lines beside cursor tip)
       Three short horizontal lines suggesting movement
       ══════════════════════════════════════ -->
  <g
     stroke="url(#accentGrad)"
     stroke-linecap="round"
     opacity="0.85"
     id="g586"
     style="stroke:url(#linearGradient1328)"
     transform="matrix(1.067794,0,0,1.067794,-1.9334566,-2.1002989)">
    <line
       x1="37"
       y1="14"
       x2="44"
       y2="14"
       stroke-width="1.8"
       id="line580"
       style="stroke:url(#linearGradient1322)" />
    <line
       x1="38"
       y1="18.5"
       x2="44"
       y2="18.5"
       stroke-width="1.4"
       id="line582"
       style="stroke:url(#linearGradient1324)" />
    <line
       x1="39.5"
       y1="23"
       x2="44"
       y2="23"
       stroke-width="1"
       id="line584"
       style="stroke:url(#linearGradient1326)" />
  </g>
  <g
     transform="matrix(1.3613137,0,0,1.3613137,30.745939,25.793404)"
     id="g381"
     style="fill:none;stroke:#ffffff;stroke-width:2.1741;stroke-dasharray:none;stroke-opacity:1">
    <linearGradient
       id="linearGradient724"
       gradientUnits="objectBoundingBox"
       x1="0"
       y1="0"
       x2="0.60000002"
       y2="1">
      <stop
         offset="0%"
         style="stop-color:rgba(255,255,255,1);"
         id="stop720" />
      <stop
         offset="100%"
         style="stop-color:rgba(208,216,240,1);"
         id="stop722" />
    </linearGradient>
    <path
       transform="translate(-28,-26)"
       style="fill:none;stroke:#ffffff;stroke-width:2.1741;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:none;stroke-opacity:1"
       stroke-linecap="round"
       d="m 20,10 v 28 l 5.5,-6 5,10 3,-1.5 -5,-10 H 36 Z"
       id="path379" />
  </g>
</svg>
